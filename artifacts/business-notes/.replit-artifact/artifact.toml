kind = "web"
previewPath = "/"
title = "Business Management Notes"
version = "1.0.0"
id = "artifacts/business-notes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22827

[services.development]
run = "pnpm --filter @workspace/business-notes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/business-notes", "run", "build" ]
publicDir = "artifacts/business-notes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22827"
BASE_PATH = "/"
